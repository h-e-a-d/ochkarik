<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Disorders Section Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; }

  /* Section */
  .vision-disorders-section {
    background: #ffffff;
    padding: 80px 40px;
    text-align: center;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ff6b4a;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 36px;
    font-weight: 700;
    color: #0a2a3d;
    margin-bottom: 8px;
  }

  .section-subtitle {
    font-size: 15px;
    color: #6b7280;
    font-weight: 300;
    margin-bottom: 40px;
  }

  /* Pill tabs */
  .condition-tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .condition-tab {
    padding: 10px 28px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    border: 2px solid transparent;
    letter-spacing: 0.3px;
  }

  .condition-tab.active {
    background: #0a2a3d;
    color: white;
  }

  .condition-tab:not(.active) {
    background: white;
    color: #0a2a3d;
    border-color: #d1d5db;
  }

  .condition-tab:not(.active):hover {
    border-color: #0a2a3d;
  }

  /* Image container */
  .image-wrapper {
    position: relative;
    max-width: 820px;
    margin: 0 auto 32px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(10,42,61,0.18);
  }

  .image-wrapper img {
    width: 100%;
    display: block;
    height: 420px;
    object-fit: cover;
    transition: filter 0.4s ease;
  }

  /* Glaucoma overlay */
  .glaucoma-overlay {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    background: radial-gradient(ellipse 50% 50% at 50% 50%,
      transparent 30%,
      rgba(0,0,0,0.5) 60%,
      rgba(0,0,0,0.92) 100%);
  }

  /* Slider */
  .slider-container {
    max-width: 400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .slider-label {
    font-size: 12px;
    color: #9ca3af;
    font-weight: 500;
    white-space: nowrap;
    min-width: 36px;
  }

  .slider-label.right { text-align: right; }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, #0a2a3d 30%, #d1d5db 30%);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #0a2a3d;
    box-shadow: 0 2px 8px rgba(10,42,61,0.3);
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  /* Demo label badge */
  .demo-note {
    margin-top: 28px;
    font-size: 12px;
    color: #9ca3af;
  }
</style>
</head>
<body>

<section class="vision-disorders-section">

  <p class="section-label">Interactive Demo</p>
  <h2 class="section-title">See the World Through Different Eyes</h2>
  <p class="section-subtitle">Explore how common vision disorders affect everyday sight</p>

  <!-- Condition Tabs -->
  <div class="condition-tabs">
    <button class="condition-tab active" onclick="setCondition('healthy', this)">Healthy</button>
    <button class="condition-tab" onclick="setCondition('myopia', this)">Myopia</button>
    <button class="condition-tab" onclick="setCondition('cataracts', this)">Cataracts</button>
    <button class="condition-tab" onclick="setCondition('glaucoma', this)">Glaucoma</button>
  </div>

  <!-- Image -->
  <div class="image-wrapper" id="imageWrapper">
    <img id="sceneImage"
      src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?w=1200&q=85"
      alt="City street scene"
      style="object-position: center 20%;"
    />
    <div class="glaucoma-overlay" id="glaucomaOverlay"></div>
  </div>

  <!-- Severity Slider -->
  <div class="slider-container" id="sliderContainer" style="opacity:0; pointer-events:none; transition: opacity 0.3s;">
    <span class="slider-label">Mild</span>
    <input type="range" id="severitySlider" min="0" max="100" value="30"
      oninput="updateEffect(this.value)" />
    <span class="slider-label right">Severe</span>
  </div>

  <p class="demo-note">Try each condition and drag the slider to explore severity levels</p>

</section>

<script>
  let currentCondition = 'healthy';

  function setCondition(condition, btn) {
    currentCondition = condition;

    // Update tabs
    document.querySelectorAll('.condition-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    // Show/hide slider
    const slider = document.getElementById('sliderContainer');
    if (condition === 'healthy') {
      slider.style.opacity = '0';
      slider.style.pointerEvents = 'none';
    } else {
      slider.style.opacity = '1';
      slider.style.pointerEvents = 'auto';
    }

    // Reset slider
    document.getElementById('severitySlider').value = 30;
    updateEffect(30);
  }

  function updateEffect(value) {
    const img = document.getElementById('sceneImage');
    const overlay = document.getElementById('glaucomaOverlay');
    const v = value / 100; // 0-1

    // Reset
    img.style.filter = 'none';
    overlay.style.opacity = '0';

    if (currentCondition === 'healthy') return;

    if (currentCondition === 'myopia') {
      const blurPx = v * 10;
      img.style.filter = `blur(${blurPx}px)`;
    }

    if (currentCondition === 'cataracts') {
      const blur = v * 4;
      const brightness = 1 - v * 0.35;
      const sepia = v * 0.6;
      const contrast = 1 - v * 0.2;
      img.style.filter = `blur(${blur}px) brightness(${brightness}) sepia(${sepia}) contrast(${contrast})`;
      overlay.style.background = `rgba(255,245,200,${v * 0.35})`;
      overlay.style.opacity = '1';
    }

    if (currentCondition === 'glaucoma') {
      const innerRadius = Math.max(5, 55 - v * 50);
      const midRadius = Math.min(innerRadius + 20, 80);
      overlay.style.background = `radial-gradient(ellipse 50% 50% at 50% 50%,
        transparent ${innerRadius}%,
        rgba(0,0,0,0.7) ${midRadius}%,
        rgba(0,0,0,0.97) 100%)`;
      overlay.style.opacity = '1';
      img.style.filter = `brightness(${1 - v * 0.2})`;
    }
  }

  // Init
  updateEffect(30);
</script>
</body>
</html>
